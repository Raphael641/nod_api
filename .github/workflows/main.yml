name: Atualizar Mancha Criminal NOD

on:
  schedule:
    # Roda toda segunda-feira às 05:00 da manhã
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        pip install pandas requests

    - name: Processar Dados do ISP
      run: python processar_isp.py

    - name: Upload do JSON para o Servidor (Modo Seguro)
      # Corrigida a indentação e adicionado comando robusto
      run: |
        curl -v --ftp-pasv -T isp_crime_stats.json "ftp://ftpupload.net/htdocs/isp_crime_stats.json" --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
