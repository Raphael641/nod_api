name: Atualizar Mancha Criminal NOD

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão crucial para o robô salvar o arquivo no GitHub

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install pandas requests

      - name: Processar Dados do ISP
        run: python processar_isp.py

      - name: Salvar JSON no Repositório GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add isp_crime_stats.json
          git commit -m "Atualizando mancha criminal: $(date)" || echo "Sem mudanças"
          git push
