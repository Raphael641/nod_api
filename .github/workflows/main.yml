name: Atualizar Mancha Criminal NOD ISP-RJ

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'processar_isp.py'

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests urllib3
      
      - name: Processar dados criminais
        run: python processar_isp.py
        continue-on-error: false
      
      - name: Verificar arquivo gerado
        run: |
          if [ -f "isp_crime_stats.json" ]; then
            echo "✅ JSON gerado com sucesso!"
            echo "📊 Conteúdo:"
            head -c 500 isp_crime_stats.json
          else
            echo "❌ Falha na geração do JSON"
            exit 1
          fi
      
      - name: Commit e push
        run: |
          git config --global user.name "NOD Bot"
          git config --global user.email "nod-bot@localhost"
          git add isp_crime_stats.json
          git commit -m "Atualização ISP-RJ - $(date '+%Y-%m-%d %H:%M')" || echo "Sem mudanças"
          git push
