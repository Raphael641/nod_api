name: Atualizar Mancha Criminal NOD ISP-RJ

on:
  schedule:
    # Executa toda segunda-feira às 6h da manhã
    - cron: '0 6 * * 1'
  # Permite execução manual via GitHub UI
  workflow_dispatch:

jobs:
  atualizar-dados-criminais:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permissão essencial para salvar o JSON
    
    steps:
      - name: 📥 Checkout do código fonte
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # REMOVIDO O CACHE - causa do erro
      
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests
      
      - name: 🚀 Processar dados criminais do ISP-RJ
        run: python processar_isp.py
        continue-on-error: false
      
      - name: 📊 Validar arquivo gerado
        run: |
          if [ ! -f "isp_crime_stats.json" ]; then
            echo "❌ Arquivo JSON não foi gerado!"
            exit 1
          fi
          echo "✅ Arquivo JSON gerado com sucesso"
          echo "📏 Tamanho: $(wc -c < isp_crime_stats.json) bytes"
          echo "📝 Primeiras linhas:"
          head -n 5 isp_crime_stats.json
      
      - name: 💾 Salvar JSON no repositório
        run: |
          git config --global user.name "NOD Bot - ISP Integration"
          git config --global user.email "nod-bot@gm-rio.rj.gov.br"
          git add isp_crime_stats.json
          git commit -m "🤖 Atualização automática da mancha criminal ISP-RJ - $(date '+%d/%m/%Y %H:%M')" || echo "📭 Sem alterações para commit"
          git push
      
      - name: ✅ Notificar conclusão
        if: success()
        run: echo "🎉 Dados criminais atualizados com sucesso em $(date)"
      
      - name: ❌ Notificar falha
        if: failure()
        run: echo "⚠️ Falha na atualização dos dados criminais - verificar logs"
